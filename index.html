<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="klj9dPHL1Zgy7YoznS1sn6UELE7e4qh3FOuo_6mn97Y" />
    <title>Graph Maker | Instant Real-Time Data Visualization</title>
    <meta name="title" content="Graph Maker | Instant Real-Time Data Visualization">
    <meta name="description" content="A free, open-source tool to create and download beautiful charts instantly. No account required.">
    <meta name="keywords" content="graph maker, chart generator, data visualization, open source, Chart.js, free tool">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        
        <aside class="sidebar card">
            <header>
                <h1>Graph Maker <span class="dot">.</span></h1>
                <p>Visualize your data instantly.</p>
            </header>

            <div class="control-panel">
    
                <div class="tab-navigation">
                    <button class="tab-btn active" onclick="switchTab(event, 'data-tab')">Data</button>
                    <button class="tab-btn" onclick="switchTab(event, 'labels-tab')">Labels</button>
                    <button class="tab-btn" onclick="switchTab(event, 'styles-tab')">Styles</button>
                </div>

                <div id="data-tab" class="tab-content active">
                    <div class="data-header">
                        <label>Your Data Points</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <button onclick="clearWorkspace()" class="add-btn" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3);">⟲ Reset</button>
                            <button onclick="addDataRow()" class="add-btn">+ Add Row</button>
                        </div>
                    </div>
                    <div id="data-points-container" class="data-points-container">
                        </div>
                </div>

                <div id="labels-tab" class="tab-content">
                    <div class="input-group">
                        <label for="chartTitle">Chart Title</label>
                        <input type="text" id="chartTitle" placeholder="e.g., Monthly Revenue 2024">
                    </div>
                    <div class="input-group" style="margin-top: 1rem;">
                        <label for="xAxisLabel">X-Axis Label</label>
                        <input type="text" id="xAxisLabel" placeholder="e.g., Months">
                    </div>
                    <div class="input-group" style="margin-top: 1rem;">
                        <label for="yAxisLabel">Y-Axis Label</label>
                        <input type="text" id="yAxisLabel" placeholder="e.g., Sales ($)">
                    </div>
                </div>

                <div id="styles-tab" class="tab-content">
                    <div class="input-group">
                        <label for="graphType">Chart Style</label>
                        <div class="select-wrapper">
                            <select id="graphType">
                                <option value="bar">Bar Chart</option>
                                <option value="line">Line Chart</option>
                                <option value="area">Area Chart</option>
                                <option value="pie">Pie Chart</option>
                                <option value="doughnut">Doughnut</option>
                                <option value="polarArea">Polar Area</option>
                                <option value="radar">Radar Chart</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group" style="margin-top: 1rem;">
                        <label for="themeSelect">Appearance</label>
                        <div class="select-wrapper">
                            <select id="themeSelect" onchange="changeTheme(this.value)">
                                <option value="dark">Dark Mode</option>
                                <option value="light">Light Mode</option>
                                <option value="transparent">Transparent Glass</option>
                            </select>
                        </div>
                    </div>
                </div>

                <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="handleCSVImport(event)">
                    <button type="button" class="add-btn" onclick="document.getElementById('csv-import').click()">📥 Import CSV</button>    

                <div class="action-buttons">
                    <button id="downloadBtn" onclick="downloadGraph()" class="download-btn" style="display: none;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        Download
                    </button>
                    <button id="shareBtn" onclick="shareGraph()" class="share-btn">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8m-10-4l4-4m0 0l4 4m-4-4v12"/>
                        </svg>
                        Share Link
                    </button>
                </div>
            </div>
        </aside>

        <main class="chart-display card">
            <div class="canvas-wrapper">
                <canvas id="myChart"></canvas>
            </div>
        </main>

    </div>
    <script src="script.js"></script>
</body>
</html>
